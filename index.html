<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swerve - Rare Music Recommender</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0a0a0a; 
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        h1 { 
            font-size: 2.5rem; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: #888; margin-bottom: 2rem; }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }
        textarea {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #333;
            border-radius: 12px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #333;
            border-radius: 12px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        
        .results { display: grid; gap: 1rem; }
        .track-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }
        .track-info h3 { margin-bottom: 0.3rem; }
        .track-info p { color: #888; font-size: 0.9rem; }
        .rarity { 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem;
            font-weight: bold;
        }
        .rare { background: #22c55e20; color: #22c55e; }
        .popular { background: #f59e0b20; color: #f59e0b; }
        
        .loading { text-align: center; padding: 2rem; color: #888; }
        .error { background: #ef444420; color: #ef4444; padding: 1rem; border-radius: 12px; }
        
        .vibe { 
            background: #667eea20; 
            padding: 1rem; 
            border-radius: 12px; 
            margin-bottom: 2rem;
        }
        
        .input-tracks {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .input-tracks h4 { color: #888; margin-bottom: 0.5rem; }
        .input-track {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem;
            border-bottom: 1px solid #333;
            font-size: 0.9rem;
        }
        
        .helper { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Swerve</h1>
        <p class="subtitle">Rare Music Recommender powered by AI</p>
        
        <div class="search-box">
            <textarea id="trackUris" placeholder="Inserisci Spotify Track URI (uno per riga o separati da virgola)&#10;&#10;Es:&#10;spotify:track:6wOJ0H5NRT6P45LKqyjlah&#10;spotify:track:5gfuPRh2118jWEhuH1tdHw"></textarea>
            <button onclick="getRecommendations()">Cerca</button>
        </div>
        <p class="helper">Inserisci i brani dalla tua playlist preferiti - il sistema troverà brani SIMILI ma diversi</p>
        
        <div id="inputTracks" class="input-tracks" style="display:none;">
            <h4>Playlist analizzata:</h4>
            <div id="inputTracksList"></div>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        const SPOTIFY_CLIENT_ID = "5d04043e27d04cee91b233ab4e7791fc";
        const SPOTIFY_CLIENT_SECRET = "14dce712909a4311986a2c86dfae9848";
        
        let accessToken = null;
        
        async function getSpotifyToken() {
            const response = await fetch("https://accounts.spotify.com/api/token", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "Authorization": "Basic " + btoa(SPOTIFY_CLIENT_ID + ":" + SPOTIFY_CLIENT_SECRET)
                },
                body: "grant_type=client_credentials"
            });
            const data = await response.json();
            accessToken = data.access_token;
        }
        
        async function getRecommendations() {
            const uriInput = document.getElementById('trackUris').value.trim();
            const results = document.getElementById('results');
            
            if (!uriInput) {
                results.innerHTML = '<div class="error">Inserisci almeno un Spotify Track URI</div>';
                return;
            }
            
            // Parse track URIs
            const trackUris = uriInput.split(/[\n,]/).map(u => u.trim()).filter(u => u.startsWith('spotify:track:'));
            
            if (trackUris.length === 0) {
                results.innerHTML = '<div class="error">Nessun Spotify Track URI valido trovato</div>';
                return;
            }
            
            results.innerHTML = '<div class="loading">Analizzando la playlist e cercando tracce simili...</div>';
            
            if (!accessToken) await getSpotifyToken();
            
            try {
                // Get all input tracks info
                const inputTracks = [];
                const inputTrackIds = new Set();
                const inputArtistNames = new Set();
                const inputTrackNames = new Set();
                
                for (const uri of trackUris) {
                    const trackId = uri.replace('spotify:track:', '');
                    try {
                        const trackRes = await fetch(`https://api.spotify.com/v1/tracks/${trackId}`, {
                            headers: { "Authorization": "Bearer " + accessToken }
                        });
                        if (trackRes.ok) {
                            const track = await trackRes.json();
                            inputTracks.push(track);
                            inputTrackIds.add(track.id);
                            inputArtistNames.add(track.artists[0].name.toLowerCase());
                            inputTrackNames.add(track.name.toLowerCase());
                        }
                    } catch (e) {
                        console.error("Error fetching track:", trackId, e);
                    }
                }
                
                if (inputTracks.length === 0) {
                    results.innerHTML = '<div class="error">Nessun brano trovato</div>';
                    return;
                }
                
                // Show input tracks
                document.getElementById('inputTracks').style.display = 'block';
                document.getElementById('inputTracksList').innerHTML = inputTracks.map(t => 
                    `<div class="input-track">
                        <span>${t.name} - ${t.artists[0].name}</span>
                        <span style="color:#666">${t.album.name}</span>
                    </div>`
                ).join('');
                
                // Analyze vibe and create queries based on the playlist
                const mainArtist = inputTracks[0].artists[0].name;
                const genre = detectGenre(inputTracks);
                
                const searchQueries = [
                    `rare ${genre} obscure underground vinyl`,
                    `lost ${genre} 1970s vintage`,
                    `rare bossanova obscure`,
                    `forgotten jazz fusion rare`,
                    `library music rare groove`,
                    `underground soul rare vinyl`,
                    `rare ${genre} 1960s 1970s`,
                    `obscure ${genre} international`,
                    `rare latin jazz obscure`,
                    `forgotten pop rare vinyl`
                ];
                
                let allTracks = [];
                
                for (const query of searchQueries) {
                    const searchRes = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=20`, {
                        headers: { "Authorization": "Bearer " + accessToken }
                    });
                    const searchData = await searchRes.json();
                    if (searchData.tracks) {
                        allTracks = [...allTracks, ...searchData.tracks.items];
                    }
                }
                
                // Filter: exclude input tracks, same titles, same artists
                const uniqueTracks = [];
                const seen = new Set();
                
                for (const t of allTracks) {
                    const artistLower = t.artists[0].name.toLowerCase();
                    const nameLower = t.name.toLowerCase();
                    
                    // Skip if: same ID, same artist, or very similar name
                    if (inputTrackIds.has(t.id)) continue;
                    if (inputArtistNames.has(artistLower)) continue;
                    if (inputTrackNames.has(nameLower)) continue;
                    
                    // Skip if artist name appears in input (might be same track)
                    const isSameArtist = Array.from(inputArtistNames).some(ia => 
                        artistLower.includes(ia) || ia.includes(artistLower)
                    );
                    if (isSameArtist && inputTracks.length < 5) continue; // Only strict filter for small playlists
                    
                    if (!seen.has(t.id)) {
                        seen.add(t.id);
                        uniqueTracks.push(t);
                    }
                }
                
                uniqueTracks.sort((a, b) => a.popularity - b.popularity);
                
                results.innerHTML = `
                    <div class="vibe">
                        <strong>Playlist analizzata:</strong> ${inputTracks.length} brani<br>
                        <strong>Genere rilevato:</strong> ${genre}<br>
                        <strong>Brani simili trovati:</strong> ${uniqueTracks.length}
                    </div>
                    <h2>Rare Tracks Simili</h2>
                    <div class="results">
                        ${uniqueTracks.slice(0, 30).map(t => `
                            <div class="track-card">
                                <div class="track-info">
                                    <h3>${t.name}</h3>
                                    <p>${t.artists[0].name} • ${t.album.name}</p>
                                </div>
                                <span class="rarity ${t.popularity < 30 ? 'rare' : 'popular'}">
                                    ${t.popularity < 30 ? 'RARA' : 'pop: ' + t.popularity}
                                </span>
                            </div>
                        `).join('')}
                    </div>
                `;
                
            } catch (err) {
                results.innerHTML = `<div class="error">Errore: ${err.message}</div>`;
            }
        }
        
        function detectGenre(tracks) {
            // Simple genre detection based on artist names and track characteristics
            const allNames = tracks.map(t => t.name + ' ' + t.artists[0].name).join(' ').toLowerCase();
            
            if (allNames.includes('bossa') || allNames.includes('jazz') || allNames.includes('samba')) {
                return 'bossa nova jazz';
            }
            if (allNames.includes('soul') || allNames.includes('funk')) {
                return 'soul funk';
            }
            if (allNames.includes('rock') || allNames.includes('pop')) {
                return 'rock pop';
            }
            if (allNames.includes('latin') || allNames.includes('español') || allNames.includes('italiano')) {
                return 'latin italian';
            }
            if (allNames.includes('classical') || allNames.includes('orchestra')) {
                return 'classical orchestral';
            }
            return 'vintage soul jazz';
        }
    </script>
</body>
</html>
